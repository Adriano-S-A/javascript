<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brasileiro ?</title>
</head>
<body>
    <h1>Qual é o seu País?</h1>
    Digite seu país: <input type="text" name="txt01" id="txt01">
    <input type="button" value="verificar" onclick="analisar()">
    <div id="res"></div>

    <script>
        
        function analisar(){
            var txt1 = document.querySelector('input#txt01')
            var txt001 = String(txt1.value)
            var res = document.querySelector('div#res')
            res.style.font = '20pt Arial'
            
            if (txt001 == 'Brasil'){
                res.innerHTML = `<p><strong>Você é Brasileiro!</strong></p>`
            } else {
                res.innerHTML = `<p><strong>Você é estrangeiro!</strong></p>`
            }
        }
    </script>
</body>
</html>
